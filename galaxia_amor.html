<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galaxia Amor 💖</title>
<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

button {
 position:fixed; bottom:20px; left:20px;
 background:#ff4da6; color:white;
 border:none; padding:10px 15px;
 border-radius:10px; cursor:pointer;
 font-size:16px;
}
</style>
</head>
<body>

<button onclick="musica()">🎵 Música</button>
<canvas id="c"></canvas>

<audio id="music" loop>
  <source src="TU_MUSICA.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let scale = 1;
let offsetX = 0, offsetY = 0;
let dragging = false;
let startX, startY;

let time = 0;

const frases = [
"Te amo💕","Eres mi todo💖","Mi luz🤍","Mi princesita 🌹",
"Mi niña hermosa 🤍","Mi mujer 💗","Mi enanita ❤️",
"Mi esposita ✨","Mi vida entera 💫"
];

let textos = [];
for(let i=0;i<500;i++){
 textos.push({
   x: Math.random()*6000-3000,
   y: Math.random()*6000-3000,
   z: Math.random()*1000,
   text: frases[Math.floor(Math.random()*frases.length)],
   size: 12 + Math.random()*10
 });
}

let estrellas = [];
for(let i=0;i<200;i++){
 estrellas.push({
   x: Math.random()*canvas.width,
   y: Math.random()*canvas.height,
   size: Math.random()*2
 });
}

function draw(){
 time += 0.01;

 ctx.setTransform(1,0,0,1,0,0);
 ctx.fillStyle="black";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 ctx.fillStyle="white";
 estrellas.forEach(e=>{
   ctx.fillRect(e.x, e.y, e.size, e.size);
 });

 ctx.translate(canvas.width/2 + offsetX, canvas.height/2 + offsetY);
 ctx.scale(scale, scale);

 ctx.rotate(time * 0.1);

 let grad = ctx.createRadialGradient(0,0,50,0,0,600);
 grad.addColorStop(0,"#ff7a00");
 grad.addColorStop(0.3,"#ff3300");
 grad.addColorStop(1,"black");
 ctx.fillStyle=grad;
 ctx.beginPath();
 ctx.arc(0,0,600,0,Math.PI*2);
 ctx.fill();

 ctx.fillStyle="black";
 ctx.beginPath();
 ctx.arc(0,0,120,0,Math.PI*2);
 ctx.fill();

 textos.forEach(t=>{
   t.z -= 2;
   if(t.z < 1){
     t.z = 1000;
   }

   let depth = 1 + t.z/1000;
   let x = t.x/depth;
   let y = t.y/depth;

   ctx.shadowColor = "#ff4da6";
   ctx.shadowBlur = 10;

   ctx.fillStyle="white";
   ctx.font=(t.size/depth)+"px Arial";
   ctx.fillText(t.text, x, y);

   ctx.shadowBlur = 0;
 });

 requestAnimationFrame(draw);
}
draw();

canvas.addEventListener("mousedown",e=>{
 dragging=true;
 startX=e.clientX-offsetX;
 startY=e.clientY-offsetY;
});
canvas.addEventListener("mousemove",e=>{
 if(dragging){
   offsetX=e.clientX-startX;
   offsetY=e.clientY-startY;
 }
});
canvas.addEventListener("mouseup",()=>dragging=false);

canvas.addEventListener("touchstart",e=>{
 dragging=true;
 startX=e.touches[0].clientX-offsetX;
 startY=e.touches[0].clientY-offsetY;
});
canvas.addEventListener("touchmove",e=>{
 if(dragging){
   offsetX=e.touches[0].clientX-startX;
   offsetY=e.touches[0].clientY-startY;
 }
});
canvas.addEventListener("touchend",()=>dragging=false);

canvas.addEventListener("wheel",e=>{
 scale += e.deltaY * -0.001;
 scale = Math.min(Math.max(.2, scale), 5);
});

let lastDist=null;
canvas.addEventListener("touchmove", e=>{
 if(e.touches.length==2){
  let dx=e.touches[0].clientX-e.touches[1].clientX;
  let dy=e.touches[0].clientY-e.touches[1].clientY;
  let dist=Math.sqrt(dx*dx+dy*dy);

  if(lastDist){
    scale *= dist/lastDist;
    scale = Math.min(Math.max(.2, scale), 5);
  }
  lastDist=dist;
 }
});
canvas.addEventListener("touchend",()=>lastDist=null);

function musica(){
 let m = document.getElementById("music");
 if(m.paused){
   m.play();
 } else {
   m.pause();
 }
}
</script>

</body>
</html>
